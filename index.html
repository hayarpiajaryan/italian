<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇮🇹 Italian Verb Flash Cards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   RESET & BASE
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #eef2fb;
  --bg2:      #dde6f7;
  --surface:  #ffffff;
  --surface2: #f0f4ff;
  --border:   rgba(30,58,138,0.14);
  --cobalt:   #1e3a8a;
  --cobalt2:  #2e5aa7;
  --sky:      #86c5ff;
  --lemon:    #ffd60a;
  --lemon2:   #ffa62b;
  --red:      #1e3a8a;
  --red-dim:  #2e5aa7;
  --green:    #1e7a3a;
  --green-dim:#2dc653;
  --blue:     #2e5aa7;
  --purple:   #5a3ea8;
  --orange:   #ffa62b;
  --text:     #0f1c3f;
  --text2:    #354070;
  --text3:    #8090b8;
  --gold:     #ffd60a;
  --radius:   16px;
  --radius-sm: 10px;
  font-size: 16px;
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Vertical stripe background — Amalfi beach umbrella style */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    repeating-linear-gradient(
      90deg,
      rgba(30,58,138,0.055) 0px, rgba(30,58,138,0.055) 28px,
      transparent 28px, transparent 56px
    ),
    linear-gradient(180deg, #eef2fb 0%, #e8eeff 100%);
  pointer-events: none;
  z-index: 0;
}

/* ============================================================
   CONFETTI CANVAS
   ============================================================ */
#confetti-canvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9999;
  opacity: 0;
  transition: opacity 0.3s;
}
#confetti-canvas.active { opacity: 1; }

/* ============================================================
   HEADER
   ============================================================ */
#header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--cobalt);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 4px solid var(--lemon);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
  animation: slideDown 0.5s ease both;
}

@keyframes slideDown {
  from { transform: translateY(-100%); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo-flag { font-size: 1.5rem; }
.logo-text { font-family: 'Playfair Display', serif; font-size: 1.15rem; font-weight: 700; color: #fff; }
.logo-text span { color: var(--lemon); }

.mode-btns { display: flex; gap: 6px; flex-wrap: wrap; }
.mode-btn {
  padding: 7px 18px;
  border: 1.5px solid rgba(255,255,255,0.25);
  background: rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.8);
  border-radius: 24px;
  cursor: pointer;
  font-size: 0.8rem;
  font-weight: 600;
  font-family: 'Inter', sans-serif;
  transition: all 0.25s;
  position: relative;
  overflow: hidden;
}
.mode-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--lemon);
  opacity: 0;
  transition: opacity 0.25s;
  border-radius: inherit;
}
.mode-btn:hover { color: #fff; border-color: rgba(255,255,255,0.6); }
.mode-btn:hover::before { opacity: 0.15; }
.mode-btn.active {
  background: var(--lemon);
  border-color: var(--lemon);
  color: var(--cobalt);
  font-weight: 700;
  box-shadow: 0 2px 12px rgba(255,214,10,0.5);
}
.mode-btn.active::before { opacity: 0; }

/* ============================================================
   FILTER BAR
   ============================================================ */
.filter-bar {
  display: flex;
  gap: 6px;
  align-items: center;
  flex-wrap: wrap;
  padding: 10px 24px;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(30,58,138,0.12);
  animation: slideDown 0.5s 0.1s ease both;
}

.filter-label { font-size: 0.72rem; color: var(--text3); margin-right: 2px; letter-spacing: 0.5px; text-transform: uppercase; }

.filter-btn {
  padding: 4px 12px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  border-radius: 12px;
  cursor: pointer;
  font-size: 0.75rem;
  font-family: 'Inter', sans-serif;
  font-weight: 500;
  transition: all 0.2s;
}
.filter-btn:hover { border-color: var(--cobalt2); color: var(--cobalt); background: rgba(30,58,138,0.06); }
.filter-btn.active { background: var(--cobalt); border-color: var(--cobalt); color: #fff; }
.filter-btn.e-btn.active  { background: var(--cobalt2); border-color: var(--cobalt2); }
.filter-btn.h-btn.active  { background: #1e7a3a; border-color: #1e7a3a; }
.filter-btn.r-btn.active  { background: #7c3aed; border-color: #7c3aed; }
.filter-btn.action { margin-left: auto; }

/* ============================================================
   PROGRESS & STATS
   ============================================================ */
#progress-bar-wrap {
  height: 3px;
  background: var(--surface2);
}
#progress-bar {
  height: 3px;
  background: linear-gradient(90deg, #2e5aa7, #ffa62b);
  transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  width: 0%;
  box-shadow: 0 0 8px rgba(46,90,167,0.35);
}

#stats {
  display: flex;
  gap: 0;
  padding: 0;
  font-size: 0.78rem;
  color: var(--text3);
  background: rgba(30,58,138,0.06);
  border-bottom: 1px solid var(--border);
  animation: slideDown 0.5s 0.15s ease both;
  overflow-x: auto;
}
.stat-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-right: 1px solid var(--border);
  white-space: nowrap;
}
.stat-item:last-child { border-right: none; }
.stat-icon { font-size: 0.85rem; }
.stat-val {
  font-weight: 700;
  color: var(--text);
  font-size: 0.85rem;
  transition: transform 0.2s, color 0.2s;
  display: inline-block;
}
.stat-val.bump {
  animation: statBump 0.4s ease;
}
@keyframes statBump {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.4); color: var(--gold); }
  100% { transform: scale(1); }
}

/* ============================================================
   MAIN AREA
   ============================================================ */
#main {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 32px 20px 60px;
  min-height: calc(100vh - 140px);
  position: relative;
  z-index: 1;
}

/* ============================================================
   FLASHCARD
   ============================================================ */
.card-scene {
  width: 100%;
  max-width: 640px;
  height: 440px;
  perspective: 1200px;
  cursor: pointer;
  margin: 0 auto;
  animation: cardEntrance 0.5s ease both;
}
@keyframes cardEntrance {
  from { transform: translateY(30px) scale(0.97); opacity: 0; }
  to   { transform: translateY(0)    scale(1);    opacity: 1; }
}
.card-scene.slide-left  { animation: slideLeft  0.35s ease both; }
.card-scene.slide-right { animation: slideRight 0.35s ease both; }
@keyframes slideLeft {
  from { transform: translateX(60px) scale(0.97); opacity: 0; }
  to   { transform: translateX(0)    scale(1);    opacity: 1; }
}
@keyframes slideRight {
  from { transform: translateX(-60px) scale(0.97); opacity: 0; }
  to   { transform: translateX(0)     scale(1);    opacity: 1; }
}

.card {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
  border-radius: var(--radius);
}
.card.flipped { transform: rotateY(180deg); }

.card-face {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: var(--radius);
  background: var(--surface);
  border: 1.5px solid rgba(30,58,138,0.12);
  box-shadow:
    0 8px 32px rgba(30,58,138,0.14),
    0 2px 8px rgba(30,58,138,0.08),
    0 1px 0 rgba(255,255,255,0.9) inset;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.card-back { transform: rotateY(180deg); }

/* Colored top stripe */
.card-stripe {
  height: 6px;
  background: linear-gradient(90deg, #1e3a8a, #86c5ff);
  flex-shrink: 0;
}
.card-stripe.green  { background: linear-gradient(90deg, #ffd60a, #ffa62b); }
.card-stripe.blue   { background: linear-gradient(90deg, #1e3a8a, #5a9ee0); }
.card-stripe.purple { background: linear-gradient(90deg, #7c3aed, #a78bfa); }

.card-tag {
  padding: 8px 16px;
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text3);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.card-front-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 36px 32px;
  text-align: center;
  gap: 14px;
}

.verb-it {
  font-family: 'Playfair Display', serif;
  font-size: 3.4rem;
  font-weight: 400;
  color: var(--text);
  letter-spacing: -1px;
  line-height: 1.1;
}

.verb-hint {
  font-size: 0.88rem;
  color: var(--text3);
  font-style: italic;
}

.verb-translation {
  font-size: 1.15rem;
  color: var(--text2);
  font-style: italic;
  font-family: 'Playfair Display', serif;
  letter-spacing: 0.2px;
}

.flip-hint {
  font-size: 0.72rem;
  color: var(--text3);
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 8px;
}
.flip-hint::before, .flip-hint::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* AUX BADGES */
.aux-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.aux-e  { background: rgba(30,58,138,0.1);  color: #1e3a8a; border: 1px solid rgba(30,58,138,0.25); }
.aux-h  { background: rgba(255,214,10,0.2); color: #a06c00; border: 1px solid rgba(255,166,43,0.4); }
.aux-b  { background: rgba(255,166,43,0.15);color: #c05000; border: 1px solid rgba(255,166,43,0.35);}
.aux-r  { background: rgba(124,58,237,0.1); color: #7c3aed; border: 1px solid rgba(124,58,237,0.25);}

/* CARD BACK */
.card-back-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 14px 18px;
  overflow: auto;
  gap: 4px;
}
.back-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 6px;
}
.verb-en {
  font-family: 'Playfair Display', serif;
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--text);
}

.tense-label {
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--cobalt);
  margin: 8px 0 4px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.tense-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: rgba(30,58,138,0.18);
}

.conj-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 3px 12px;
}
.conj-row {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 0.82rem;
}
.pron {
  background: var(--cobalt);
  color: #fff;
  padding: 2px 7px;
  border-radius: 5px;
  font-size: 0.65rem;
  font-weight: 700;
  min-width: 40px;
  text-align: center;
  letter-spacing: 0.3px;
}
.pron.noi { background: var(--cobalt2); }
.pron.voi { background: #5a7ec4; }
.pron.loro { background: var(--lemon2); color: #1a1e2e; }
.conj-form { font-weight: 600; color: var(--text); }

.ex-line {
  font-size: 0.76rem;
  color: var(--text2);
  font-style: italic;
  margin-top: 4px;
  padding: 6px 10px;
  background: rgba(0,0,0,0.03);
  border-radius: 6px;
  border-left: 3px solid var(--lemon2);
}
.ex-line b { color: var(--cobalt); font-style: normal; font-weight: 700; }

/* KNOWN BADGE ON CARD */
.known-badge {
  position: absolute;
  top: 12px;
  right: 12px;
  width: 30px;
  height: 30px;
  background: var(--lemon);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.85rem;
  box-shadow: 0 0 14px rgba(255,214,10,0.6), 0 2px 6px rgba(0,0,0,0.1);
  animation: popIn 0.3s ease;
  z-index: 10;
}
@keyframes popIn {
  from { transform: scale(0); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}

/* ============================================================
   NAV ROW
   ============================================================ */
.nav-row {
  display: flex;
  gap: 10px;
  align-items: center;
  max-width: 640px;
  width: 100%;
  margin-top: 20px;
  justify-content: center;
  flex-wrap: wrap;
}
.nav-btn {
  padding: 11px 22px;
  border: none;
  border-radius: 28px;
  cursor: pointer;
  font-size: 0.86rem;
  font-weight: 600;
  font-family: 'Inter', sans-serif;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
  position: relative;
  overflow: hidden;
}
.nav-btn:active { transform: scale(0.96); }
.nav-btn.primary  { background: var(--cobalt); color: #fff; box-shadow: 0 4px 16px rgba(30,58,138,0.35); }
.nav-btn.primary:hover { background: #2e5aa7; box-shadow: 0 6px 22px rgba(30,58,138,0.45); transform: translateY(-2px); }
.nav-btn.secondary { background: transparent; border: 2px solid var(--cobalt); color: var(--cobalt); }
.nav-btn.secondary:hover { background: var(--cobalt); color: #fff; }
.nav-btn.ghost  { background: rgba(255,255,255,0.7); color: var(--text2); border: 1.5px solid rgba(30,58,138,0.15); backdrop-filter: blur(8px); }
.nav-btn.ghost:hover { background: white; color: var(--text); border-color: var(--cobalt2); }
.nav-btn.green  { background: var(--lemon); color: var(--cobalt); font-weight: 700; box-shadow: 0 4px 16px rgba(255,214,10,0.45); }
.nav-btn.green:hover { background: #ffe033; box-shadow: 0 6px 22px rgba(255,214,10,0.55); transform: translateY(-2px); }

.nav-counter {
  font-size: 0.82rem;
  color: var(--text3);
  padding: 8px 12px;
  background: var(--surface2);
  border-radius: 20px;
  border: 1px solid var(--border);
  font-variant-numeric: tabular-nums;
}

/* Keyboard hint */
.kbd-hints {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 12px;
  font-size: 0.7rem;
  color: var(--text3);
}
.kbd-hint { display: flex; align-items: center; gap: 4px; }
.kbd {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-bottom-width: 2px;
  border-radius: 4px;
  padding: 1px 6px;
  font-size: 0.65rem;
  font-weight: 700;
  color: var(--text2);
  min-width: 22px;
}

/* ============================================================
   QUIZ MODE
   ============================================================ */
.quiz-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: 0 4px 24px rgba(0,0,0,0.10);
  max-width: 640px;
  width: 100%;
  overflow: hidden;
  animation: cardEntrance 0.4s ease both;
}
.quiz-header {
  background: linear-gradient(135deg, #ffd60a 0%, #ffa62b 100%);
  padding: 20px 24px;
  position: relative;
  overflow: hidden;
}
.quiz-header::after {
  content: '';
  position: absolute;
  right: -30px;
  top: -30px;
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
}
.quiz-title {
  font-family: 'Playfair Display', serif;
  font-size: 2rem;
  font-weight: 700;
  color: var(--cobalt);
  position: relative;
}
.quiz-sub {
  font-size: 0.82rem;
  color: rgba(30,58,138,0.75);
  margin-top: 4px;
  position: relative;
  font-weight: 600;
}
.quiz-body { padding: 20px 24px; }
.quiz-question {
  font-size: 0.95rem;
  color: var(--text2);
  margin-bottom: 16px;
  line-height: 1.5;
}
.quiz-question strong { color: var(--text); font-size: 1.05rem; }
.quiz-opts {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.quiz-opt {
  padding: 13px 16px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface2);
  cursor: pointer;
  font-size: 0.9rem;
  font-weight: 600;
  font-family: 'Inter', sans-serif;
  color: var(--text);
  transition: all 0.2s;
  text-align: left;
}
.quiz-opt:hover:not(.disabled) {
  border-color: var(--cobalt);
  background: rgba(30,58,138,0.07);
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(30,58,138,0.15);
}
.quiz-opt.correct {
  border-color: #1e7a3a;
  background: rgba(30,122,58,0.1);
  color: #1e7a3a;
  animation: correctPop 0.4s ease;
}
@keyframes correctPop {
  0%   { transform: scale(1); }
  50%  { transform: scale(1.04); }
  100% { transform: scale(1); }
}
.quiz-opt.wrong {
  border-color: #c0392b;
  background: rgba(192,57,43,0.1);
  color: #c0392b;
  animation: shake 0.4s ease;
}
.quiz-opt.disabled { cursor: default; }

.quiz-feedback {
  margin-top: 16px;
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  font-size: 0.85rem;
  font-weight: 500;
  animation: fadeIn 0.3s ease;
}
.quiz-feedback.good {
  background: rgba(45,198,83,0.12);
  color: var(--green);
  border: 1px solid rgba(45,198,83,0.25);
}
.quiz-feedback.bad {
  background: rgba(230,57,70,0.1);
  color: var(--red);
  border: 1px solid rgba(230,57,70,0.2);
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ============================================================
   MATCH MODE
   ============================================================ */
.match-header {
  max-width: 720px;
  width: 100%;
  text-align: center;
  margin-bottom: 16px;
  color: var(--text2);
  font-size: 0.9rem;
  animation: fadeIn 0.4s ease;
}
.match-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  max-width: 720px;
  width: 100%;
}
.match-col-label {
  font-size: 0.7rem;
  color: var(--text3);
  text-align: center;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 4px;
  font-weight: 600;
}
.match-card {
  padding: 14px 16px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  cursor: pointer;
  font-size: 0.88rem;
  font-weight: 600;
  transition: all 0.2s;
  text-align: center;
  min-height: 54px;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: cardEntrance 0.4s ease both;
  color: var(--text);
}
.match-card:hover:not(.matched):not(.disabled) {
  border-color: var(--cobalt);
  background: rgba(30,58,138,0.07);
  transform: translateY(-2px);
  box-shadow: 0 4px 14px rgba(30,58,138,0.15);
}
.match-card.selected {
  border-color: var(--lemon2);
  background: rgba(255,214,10,0.12);
  box-shadow: 0 0 0 3px rgba(255,214,10,0.35);
  color: var(--cobalt);
}
.match-card.matched {
  border-color: #1e7a3a;
  background: rgba(30,122,58,0.1);
  color: #1e7a3a;
  cursor: default;
  animation: matchPop 0.4s ease;
}
@keyframes matchPop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.08); }
  100% { transform: scale(1); }
}
.match-card.wrong-flash {
  animation: shake 0.35s ease;
  border-color: #c0392b;
  background: rgba(192,57,43,0.1);
}

/* ============================================================
   SCORE SCREEN
   ============================================================ */
.score-screen {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: 0 4px 24px rgba(0,0,0,0.10);
  max-width: 480px;
  width: 100%;
  padding: 48px 40px;
  text-align: center;
  animation: cardEntrance 0.5s ease both;
}
.score-emoji { font-size: 3.5rem; margin-bottom: 16px; }
.score-big {
  font-family: 'Playfair Display', serif;
  font-size: 4.5rem;
  font-weight: 700;
  color: var(--cobalt);
  line-height: 1;
  animation: scoreReveal 0.6s ease both;
}
@keyframes scoreReveal {
  from { transform: scale(0.5); opacity: 0; }
  50%  { transform: scale(1.1); }
  to   { transform: scale(1);   opacity: 1; }
}
.score-pct  { font-size: 1.2rem; color: var(--text2); margin-top: 8px; }
.score-label{ font-size: 0.85rem; color: var(--text3); margin-top: 4px; }

/* ============================================================
   ANIMATIONS
   ============================================================ */
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%     { transform: translateX(-8px); }
  40%     { transform: translateX(8px); }
  60%     { transform: translateX(-5px); }
  80%     { transform: translateX(5px); }
}

/* ============================================================
   STREAK TOAST
   ============================================================ */
.streak-toast {
  position: fixed;
  top: 80px;
  right: 24px;
  background: linear-gradient(135deg, var(--gold), #f97316);
  color: #1a1000;
  padding: 10px 20px;
  border-radius: 32px;
  font-weight: 700;
  font-size: 0.9rem;
  box-shadow: 0 8px 24px rgba(255,214,10,0.4);
  z-index: 200;
  animation: toastIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  display: flex;
  align-items: center;
  gap: 6px;
}
@keyframes toastIn {
  from { transform: translateX(120%); opacity: 0; }
  to   { transform: translateX(0);    opacity: 1; }
}
.streak-toast.out {
  animation: toastOut 0.4s ease forwards;
}
@keyframes toastOut {
  from { transform: translateX(0);    opacity: 1; }
  to   { transform: translateX(120%); opacity: 0; }
}

/* ============================================================
   MODE TRANSITION OVERLAY
   ============================================================ */
.mode-transition {
  position: fixed;
  inset: 0;
  background: var(--cobalt);
  z-index: 300;
  pointer-events: none;
  clip-path: circle(0% at 50% 50%);
  transition: clip-path 0.4s ease;
}
.mode-transition.reveal {
  clip-path: circle(150% at 50% 50%);
}

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 600px) {
  .verb-it { font-size: 2.4rem; }
  .card-scene { height: 480px; }
  .quiz-opts { grid-template-columns: 1fr; }
  .match-grid { grid-template-columns: 1fr; }
  .kbd-hints { display: none; }
  #header { padding: 12px 16px; }

  #main { padding: 20px 12px 40px; }
}

// CONFETTI
// ============================================================
const canvas = document.getElementById('confetti-canvas');
const ctx = canvas.getContext('2d');
let confettiPieces = [];
let confettiAF = null;

function launchConfetti() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  canvas.classList.add('active');
  const colors = ['#e63946','#2dc653','#4361ee','#ffd60a','#f77f00','#ff69b4'];
  confettiPieces = Array.from({length: 120}, () => ({
    x: Math.random() * canvas.width,
    y: -10 - Math.random() * 100,
    r: 5 + Math.random() * 8,
    color: colors[Math.floor(Math.random()*colors.length)],
    vx: (Math.random()-0.5)*4,
    vy: 2 + Math.random()*5,
    va: (Math.random()-0.5)*0.2,
    angle: Math.random()*Math.PI*2,
    shape: Math.random() > 0.5 ? 'circle' : 'rect'
  }));
  if (confettiAF) cancelAnimationFrame(confettiAF);
  animateConfetti();
  setTimeout(() => {
    canvas.classList.remove('active');
    confettiPieces = [];
  }, 3000);
}

function animateConfetti() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  confettiPieces = confettiPieces.filter(p => p.y < canvas.height + 20);
  confettiPieces.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.angle += p.va; p.vy += 0.05;
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.angle);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = 0.9;
    if (p.shape === 'circle') {
      ctx.beginPath();
      ctx.arc(0, 0, p.r, 0, Math.PI*2);
      ctx.fill();
    } else {
      ctx.fillRect(-p.r, -p.r/2, p.r*2, p.r);
    }
    ctx.restore();
  });
  if (confettiPieces.length > 0) confettiAF = requestAnimationFrame(animateConfetti);
}

// ============================================================
let toastTimeout = null;
function showStreakToast(streak) {
  let existing = document.querySelector('.streak-toast');
  if (existing) existing.remove();
  if (toastTimeout) clearTimeout(toastTimeout);

  const msgs = {5:'🔥 5 streak!', 10:'⚡ 10 streak!', 20:'🌟 20 streak!', 50:'👑 50 streak!'};
  const msg = msgs[streak];
  if (!msg) return;

  const toast = document.createElement('div');
  toast.className = 'streak-toast';
  toast.textContent = msg;
  document.body.appendChild(toast);
  if (streak >= 10) launchConfetti();
  toastTimeout = setTimeout(() => {
    toast.classList.add('out');
    setTimeout(() => toast.remove(), 400);
  }, 2200);
}

// ============================================================
// HELPERS
// ============================================================
const PRONOUNS = ['io','tu','lei/lui','noi','voi','loro'];
const AUX_AVERE  = ['ho','hai','ha','abbiamo','avete','hanno'];
const AUX_ESSERE = ['sono','sei','è','siamo','siete','sono'];
const AUX_REF    = ['mi sono','ti sei','si è','ci siamo','vi siete','si sono'];

function getPPForm(pp, idx) {
  const base = pp.slice(0,-1);
  if (idx < 3) return pp + '/a';
  else return base + 'i/e';
}

function buildPPRows(verb) {
  let auxArr = verb.a === 'r' ? AUX_REF : (verb.a === 'e' || verb.a === 'b') ? AUX_ESSERE : AUX_AVERE;
  return PRONOUNS.map((pron, i) => ({
    pron,
    form: verb.a === 'h' ? auxArr[i]+' '+verb.pp : auxArr[i]+' '+getPPForm(verb.pp, i)
  }));
}

function auxLabel(a) {
  const map = {
    h: '<span class="aux-badge aux-h">🟢 Avere</span>',
    e: '<span class="aux-badge aux-e">🔵 Essere</span>',
    b: '<span class="aux-badge aux-b">🟠 Both</span>',
    r: '<span class="aux-badge aux-r">🟣 Reflexive</span>'
  };
  return map[a] || '';
}

function tagLabel(a) {
  return {h:'🟢 Avere',e:'🔵 Essere',b:'🟠 Both',r:'🟣 Reflexive'}[a] || '';
}

function stripeClass(a) {
  return {h:'green',e:'blue',b:'',r:'purple'}[a] || '';
}

// ============================================================
// FILTER / MODE / SHUFFLE / RESET
// ============================================================
function filteredDeck() {
  if (state.filter === 'all') return [...VERBS];
  return VERBS.filter(v => v.a === state.filter);
}

function setFilter(f, e) {
  state.filter = f;
  state.deck = filteredDeck();
  state.idx = 0; state.flipped = false; state.quizPhase = 'question';
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if (e) e.target.classList.add('active');
  if (state.mode === 'quiz') generateQuiz();
  if (state.mode === 'match') generateMatch();
  render();
}

function setMode(m, e) {
  if (m === state.mode) return;
  const overlay = document.getElementById('modeTransition');
  overlay.style.clipPath = 'circle(0% at 50% 50%)';
  overlay.style.transition = 'none';
  requestAnimationFrame(() => {
    overlay.style.transition = 'clip-path 0.35s ease';
    overlay.style.clipPath = 'circle(150% at 50% 50%)';
    setTimeout(() => {
      state.mode = m;
      state.flipped = false;
      state.idx = 0;
      state.quizPhase = 'question';
      state.matchCards = [];
      state.matchSelected = null;
      state.matchDone = new Set();
      state.matchWrong = new Set();
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      if (e) e.target.classList.add('active');
      if (m === 'quiz') generateQuiz();
      if (m === 'match') generateMatch();
      render();
      overlay.style.transition = 'clip-path 0.3s ease';
      overlay.style.clipPath = 'circle(0% at 50% 50%)';
    }, 200);
  });
}

function shuffleDeck() {
  for (let i = state.deck.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [state.deck[i],state.deck[j]] = [state.deck[j],state.deck[i]];
  }
  state.idx = 0; state.flipped = false;
  render();
}

function resetProgress() {
  state.known = new Set(); state.score = 0; state.streak = 0;
  state.idx = 0; state.flipped = false;
  render();
}

// ============================================================
// STATS UPDATE
// ============================================================
function bumpStat(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.remove('bump');
  void el.offsetWidth;
  el.classList.add('bump');
}

function updateStats() {
  const cur = state.idx + 1;
  const tot = state.deck.length;
  document.getElementById('stat-cur').textContent = cur;
  document.getElementById('stat-tot').textContent = tot;
  const knownEl = document.getElementById('stat-known');
  const streakEl = document.getElementById('stat-streak');
  const scoreEl  = document.getElementById('stat-score');
  if (knownEl.textContent  !== String(state.known.size))  { knownEl.textContent  = state.known.size;  bumpStat('stat-known'); }
  if (streakEl.textContent !== String(state.streak))      { streakEl.textContent = state.streak;       bumpStat('stat-streak'); }
  if (scoreEl.textContent  !== String(state.score))       { scoreEl.textContent  = state.score;        bumpStat('stat-score'); }
  document.getElementById('progress-bar').style.width = (cur/tot*100)+'%';
}

// ============================================================
// RENDER
// ============================================================
function render() {
  updateStats();
  if (state.mode === 'flashcard') renderFlashcard();
  else if (state.mode === 'quiz') renderQuiz();
  else if (state.mode === 'match') renderMatch();
}

  const v = state.deck[state.idx];
  if (!v) return;

  const presRows = v.pres.map((f,i) => `
    <div class="conj-row">
      <span class="pron ${i>=3?'noi':''}">${PRONOUNS[i]}</span>
      <span class="conj-form">${f}</span>
    </div>`).join('');

  const ppData = buildPPRows(v);
  const ppRows = ppData.map((r,i) => `
    <div class="conj-row">
      <span class="pron ${i>=3?'noi':''}">${r.pron}</span>
      <span class="conj-form">${r.form}</span>
    </div>`).join('');

  const sc = stripeClass(v.a);
  const isKnown = state.known.has(v.v);

  document.getElementById('main').innerHTML = `
    <div class="card-scene ${state.navDir === 'left' ? 'slide-left' : 'slide-right'}" onclick="flipCard()">
      <div class="card ${state.flipped?'flipped':''}">

        <div class="card-face">
          <div class="card-stripe ${sc}"></div>
          <div class="card-tag">
            <span>${tagLabel(v.a)}</span>
            <span>Presente &amp; Passato Prossimo</span>
          </div>
          ${isKnown ? '<div class="known-badge" title="Known!">✓</div>' : ''}
          <div class="card-front-body">
            <div class="verb-it">${v.v}</div>
            <div class="verb-translation">${v.e}</div>
            ${auxLabel(v.a)}
            <div class="flip-hint">click · space · tap</div>
          </div>
        </div>

        <div class="card-face card-back">
          <div class="card-stripe ${sc}"></div>
          <div class="card-tag">
            <span>${tagLabel(v.a)}</span>
            <span>Conjugations</span>
          </div>
          <div class="card-back-body">
            <div class="back-top">
              <div>
                <div class="verb-en">${v.v} = ${v.e}</div>
                ${auxLabel(v.a)}
              </div>
            </div>
            <div class="tense-label">Presente</div>
            <div class="conj-grid">${presRows}</div>
            <div class="ex-line">${v.exIt} — ${v.exEn}</div>
            <div class="tense-label">Passato Prossimo</div>
            <div class="conj-grid">${ppRows}</div>
          </div>
        </div>

      </div>
    </div>

    <div class="nav-row">
      <button class="nav-btn ghost" onclick="prevCard()" title="← Prev">← Prev</button>
      <button class="nav-btn secondary" onclick="flipCard()" title="Space">↔ Flip</button>
      <button class="nav-btn green" onclick="markKnown()" title="K">✓ Known</button>
      <button class="nav-btn primary" onclick="nextCard()" title="→ Next">Next →</button>
    </div>

    <div class="nav-counter">${state.idx+1} / ${state.deck.length}</div>

    <div class="kbd-hints">
      <div class="kbd-hint"><kbd class="kbd">←</kbd> Prev</div>
      <div class="kbd-hint"><kbd class="kbd">→</kbd> Next</div>
      <div class="kbd-hint"><kbd class="kbd">Space</kbd> Flip</div>
      <div class="kbd-hint"><kbd class="kbd">K</kbd> Known</div>
    </div>
  `;
}

function flipCard() {
  state.flipped = !state.flipped;
  const card = document.querySelector('.card');
  if (card) card.classList.toggle('flipped', state.flipped);
}

function nextCard() {
  state.navDir = 'left';
  state.flipped = false;
  state.idx = (state.idx + 1) % state.deck.length;
  render();
}

function prevCard() {
  state.navDir = 'right';
  state.flipped = false;
  state.idx = (state.idx - 1 + state.deck.length) % state.deck.length;
  render();
}

function markKnown() {
  const v = state.deck[state.idx];
  if (!state.known.has(v.v)) {
    state.known.add(v.v);
    state.score += 5;
    state.streak++;
    showStreakToast(state.streak);
    if (state.known.size === state.deck.length) launchConfetti();
  }
  nextCard();
}

// ============================================================
// QUIZ
// ============================================================
function generateQuiz() {
  const v = state.deck[state.idx];
  if (!v) return;
  state.quizTense = Math.random() < 0.5 ? 'pres' : 'pp';
  const pronIdx = Math.floor(Math.random() * 6);
  state.quizPronIdx = pronIdx;

  let correct;
  if (state.quizTense === 'pres') correct = v.pres[pronIdx];
  else correct = buildPPRows(v)[pronIdx].form;
  state.quizCorrectAns = correct;

  const others = state.deck.filter(x => x.v !== v.v).sort(() => Math.random()-0.5).slice(0,3);
  let opts = others.map(ov => state.quizTense === 'pres' ? ov.pres[pronIdx] : buildPPRows(ov)[pronIdx].form);
  opts.push(correct);
  for (let i = opts.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [opts[i],opts[j]] = [opts[j],opts[i]];
  }
  state.quizOpts = opts;
  state.quizCorrectIdx = opts.indexOf(correct);
  state.quizPhase = 'question';
  state.quizSelected = -1;
}

function renderQuiz() {
  const v = state.deck[state.idx];
  if (!v) return;
  const pron = PRONOUNS[state.quizPronIdx];
  const tenseLabel = state.quizTense === 'pres' ? 'Presente' : 'Passato Prossimo';

  const optsHtml = state.quizOpts.map((opt, i) => {
    let cls = 'quiz-opt';
    if (state.quizPhase === 'answered') {
      cls += ' disabled';
      if (i === state.quizCorrectIdx) cls += ' correct';
      else if (i === state.quizSelected && i !== state.quizCorrectIdx) cls += ' wrong';
    }
    return `<button class="${cls}" onclick="selectAnswer(${i})">${opt}</button>`;
  }).join('');

  let feedbackHtml = '';
  if (state.quizPhase === 'answered') {
    const correct = state.quizSelected === state.quizCorrectIdx;
    feedbackHtml = `<div class="quiz-feedback ${correct?'good':'bad'}">
      ${correct ? '🎉 Correct! +10 points' : `❌ Correct answer: <strong>${state.quizCorrectAns}</strong>`}
    </div>`;
  }

  document.getElementById('main').innerHTML = `
    <div class="quiz-card">
      <div class="quiz-header">
        <div class="quiz-title">${v.v}</div>
        <div class="quiz-sub">${v.e} &nbsp;·&nbsp; ${tagLabel(v.a)}</div>
      </div>
      <div class="quiz-body">
        <div class="quiz-question">
          Conjugate <strong>${v.v}</strong> in the <strong>${tenseLabel}</strong> for: <strong>${pron}</strong>
        </div>
        <div class="quiz-opts">${optsHtml}</div>
        ${feedbackHtml}
      </div>
    </div>
    <div class="nav-row">
      ${state.quizPhase === 'answered' ? `<button class="nav-btn primary" onclick="nextQuiz()">Next Question →</button>` : ''}
    </div>
    <div class="nav-counter">${state.idx+1} / ${state.deck.length}</div>
  `;
}

function selectAnswer(i) {
  if (state.quizPhase !== 'question') return;
  state.quizSelected = i;
  state.quizPhase = 'answered';
  if (i === state.quizCorrectIdx) {
    state.score += 10; state.streak++;
    showStreakToast(state.streak);
  } else {
    state.streak = 0;
  }
  render();
}

function nextQuiz() {
  state.idx = (state.idx + 1) % state.deck.length;
  state.flipped = false;
  generateQuiz();
  render();
}

// ============================================================
// MATCH
// ============================================================
function generateMatch() {
  const subset = [...state.deck].sort(() => Math.random()-0.5).slice(0,8);
  const its = subset.map((v,i) => ({id:i,    text:v.v, type:'it', match:i}));
  const ens = subset.map((v,i) => ({id:i+100, text:v.e, type:'en', match:i})).sort(() => Math.random()-0.5);
  state.matchPairs = subset;
  state.matchCards = [...its, ...ens];
  state.matchSelected = null;
  state.matchDone = new Set();
  state.matchWrong = new Set();
}

function renderMatch() {
  const its = state.matchCards.filter(c => c.type==='it');
  const ens = state.matchCards.filter(c => c.type==='en');

  let html = `<div class="match-header">Match the Italian verb to its English meaning</div>`;
  html += `<div class="match-grid">`;
  html += `<div class="match-col-label">Italiano</div>`;
  html += `<div class="match-col-label">English</div>`;

  its.forEach((it, i) => {
    const en = ens[i];
    const itM = state.matchDone.has(it.match), enM = state.matchDone.has(en.match);
    const itS = state.matchSelected && state.matchSelected.id === it.id;
    const enS = state.matchSelected && state.matchSelected.id === en.id;
    const itW = state.matchWrong && state.matchWrong.has(it.id);
    const enW = state.matchWrong && state.matchWrong.has(en.id);
    html += `<div class="match-card${itM?' matched':''}${itS?' selected':''}${itW?' wrong-flash':''}" onclick="selectMatch(${it.id})">${it.text}</div>`;
    html += `<div class="match-card${enM?' matched':''}${enS?' selected':''}${enW?' wrong-flash':''}" onclick="selectMatch(${en.id})">${en.text}</div>`;
  });
  html += `</div>`;

  if (state.matchDone.size === state.matchPairs.length) {
    html += `<div class="nav-row" style="margin-top:20px">
      <div style="text-align:center;color:var(--green);font-weight:700;font-size:1.1rem;width:100%;margin-bottom:12px">🎉 Round complete!</div>
      <button class="nav-btn primary" onclick="newMatch()">🔀 New Round</button>
    </div>`;
    launchConfetti();
  }

  document.getElementById('main').innerHTML = html;
}

function selectMatch(id) {
  const card = state.matchCards.find(c => c.id === id);
  if (!card || state.matchDone.has(card.match)) return;
  if (!state.matchSelected) { state.matchSelected = card; render(); return; }
  const prev = state.matchSelected;
  state.matchSelected = null;
  if (prev.id === id) { render(); return; }
  if (prev.type !== card.type && prev.match === card.match) {
    state.matchDone.add(card.match);
    state.score += 5; state.streak++;
    showStreakToast(state.streak);
  } else {
    state.matchWrong = new Set([prev.id, id]);
    state.streak = 0;
    setTimeout(() => { state.matchWrong = new Set(); render(); }, 450);
  }
  render();
}

function newMatch() { generateMatch(); render(); }

// ============================================================
// KEYBOARD
// ============================================================
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (state.mode === 'flashcard') {
    if (e.key === 'ArrowRight') nextCard();
    else if (e.key === 'ArrowLeft') prevCard();
    else if (e.key === ' ') { e.preventDefault(); flipCard(); }
    else if (e.key === 'k' || e.key === 'K') markKnown();
  }
});

// ============================================================
// TOUCH SWIPE
// ============================================================
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, {passive:true});
document.addEventListener('touchend', e => {
  if (state.mode !== 'flashcard') return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 60) {
    if (dx < 0) nextCard();
    else prevCard();
  }
}, {passive:true});

// ============================================================
// PAGE SWITCHING
// ============================================================
function setPage(p, e) {
  const overlay = document.getElementById('modeTransition');
  overlay.style.clipPath = 'circle(0% at 50% 50%)';
  overlay.style.transition = 'none';
  requestAnimationFrame(() => {
    overlay.style.transition = 'clip-path 0.35s ease';
    overlay.style.clipPath = 'circle(150% at 50% 50%)';
    setTimeout(() => {
      document.querySelectorAll('.page-btn').forEach(b => b.classList.remove('active'));
      if (e) e.target.classList.add('active');
      const verbEls = [
        document.querySelector('.filter-bar'),
        document.getElementById('progress-bar-wrap'),
        document.getElementById('stats'),
        document.getElementById('main')
      ];
      const modeWrap = document.getElementById('mode-btns-wrap');
      const weatherPage = document.getElementById('weather-page');
      if (p === 'weather') {
        verbEls.forEach(el => { if (el) el.style.display = 'none'; });
        if (modeWrap) modeWrap.style.display = 'none';
        weatherPage.style.display = 'block';
        wState.filtered = wGetFiltered();
        wRenderTabs();
        wRender();
      } else {
        verbEls.forEach(el => { if (el) el.style.display = ''; });
        if (modeWrap) modeWrap.style.display = '';
        weatherPage.style.display = 'none';
        render();
      }
      overlay.style.transition = 'clip-path 0.3s ease';
      overlay.style.clipPath = 'circle(0% at 50% 50%)';
    }, 200);
  });
}

// ============================================================
// WEATHER — CATEGORIES & STATE
// ============================================================
const W_CATS = [
  {id:"all",         label:"Все"},
  {id:"domande",     label:"❓ Вопросы"},
  {id:"nomi",        label:"📦 Существит."},
  {id:"verbi",       label:"🔄 Глаголы"},
  {id:"aggettivi",   label:"🎨 Прилагат."},
  {id:"temperatura", label:"🌡 Температура"},
];

const wState = {
  activeCat: "all",
  filtered: [],
  idx: 0,
  flipped: false,
  known: new Set()
};

function wGetFiltered() {
  if (wState.activeCat === "all") return [...W_ALL];
  return W_ALL.filter(c => c.cat === wState.activeCat);
}

function wRenderTabs() {
  const el = document.getElementById('wTabs');
  el.innerHTML = "";
  W_CATS.forEach(cat => {
    const count = cat.id === "all" ? W_ALL.length : W_ALL.filter(x => x.cat === cat.id).length;
    const btn = document.createElement('button');
    btn.className = 'w-tab' + (wState.activeCat === cat.id ? ' active' : '');
    btn.textContent = cat.label + ' (' + count + ')';
    btn.onclick = () => {
      wState.activeCat = cat.id;
      wState.idx = 0;
      wState.flipped = false;
      wState.known = new Set();
      wState.filtered = wGetFiltered();
      document.getElementById('wSummary').classList.remove('show');
      document.getElementById('wMain').style.display = '';
      wRenderTabs();
      wRender();
    };
    el.appendChild(btn);
  });
}

function wRender() {
  const filtered = wState.filtered;
  if (!filtered.length) return;
  const c = filtered[wState.idx];
  const pct = ((wState.idx + 1) / filtered.length * 100).toFixed(1);
  document.getElementById('wProgressFill').style.width = pct + '%';
  document.getElementById('wProgressLabel').textContent = (wState.idx + 1) + ' / ' + filtered.length;

  const isKnown = wState.known.has(wState.idx);
  const dotsHtml = filtered.map((_, i) =>
    `<div class="w-dot${i === wState.idx ? ' active' : ''}${wState.known.has(i) ? ' known' : ''}" onclick="wGoTo(${i})"></div>`
  ).join('');

  document.getElementById('wMain').innerHTML = `
    <div class="w-card-scene" onclick="wFlip()">
      <div class="w-card ${wState.flipped ? 'flipped' : ''}">
        <div class="w-card-face w-card-front">
          <span class="w-category">${c.catRu || c.cat}</span>
          <span class="w-flip-hint-tag">нажми чтобы перевернуть</span>
          ${isKnown ? '<div class="known-badge" title="Знаю!">✓</div>' : ''}
          <div class="w-illustration">${W_SVG[c.svg] || ''}</div>
          <div class="w-word">${c.word}</div>
          <div class="w-pronunciation">${c.pron}</div>
          <div class="w-tap">перевернуть карточку</div>
        </div>
        <div class="w-card-face w-card-back">
          <div class="w-translation">${c.trans} <span class="w-sub">${c.en}</span></div>
          <div class="w-example">
            <div class="w-it">🇮🇹 ${c.it}</div>
            <div class="w-ru">🇷🇺 ${c.ru}</div>
          </div>
          <div class="w-grammar">📌 ${c.note}</div>
        </div>
      </div>
    </div>

    <div class="w-nav">
      <button class="nav-btn ghost" onclick="wNavigate(-1)" ${wState.idx === 0 ? 'disabled style="opacity:.35"' : ''}>← Назад</button>
      <button class="nav-btn secondary" onclick="wFlip()">↻ Flip</button>
      <button class="nav-btn green" onclick="wMarkKnown()">${isKnown ? '✓ Уже знаю' : '✓ Знаю!'}</button>
      <button class="nav-btn primary" onclick="wNavigate(1)" ${wState.idx === filtered.length - 1 ? 'disabled style="opacity:.35"' : ''}>Далее →</button>
    </div>

    <div class="w-dots">${dotsHtml}</div>
    <div class="w-score-bar">Выучено: <span>${wState.known.size}</span> из ${filtered.length}</div>
  `;
}

function wFlip() {
  wState.flipped = !wState.flipped;
  const card = document.querySelector('.w-card');
  if (card) card.classList.toggle('flipped', wState.flipped);
}

function wNavigate(dir) {
  wState.flipped = false;
  const next = wState.idx + dir;
  if (next >= 0 && next < wState.filtered.length) { wState.idx = next; wRender(); }
}

function wGoTo(i) {
  wState.flipped = false;
  wState.idx = i;
  wRender();
}

function wMarkKnown() {
  if (wState.known.has(wState.idx)) {
    wState.known.delete(wState.idx);
  } else {
    wState.known.add(wState.idx);
    if (wState.known.size === wState.filtered.length) {
      launchConfetti();
      setTimeout(wShowSummary, 500);
      return;
    }
  }
  if (wState.idx < wState.filtered.length - 1) wNavigate(1);
  else wRender();
}

function wShowSummary() {
  document.getElementById('wMain').style.display = 'none';
  document.getElementById('wSummary').classList.add('show');
}

function wRestart() {
  wState.known = new Set();
  wState.idx = 0;
  wState.flipped = false;
  document.getElementById('wSummary').classList.remove('show');
  document.getElementById('wMain').style.display = '';
  wRender();
}

// ============================================================
// INIT
// ============================================================
render();
</script>
